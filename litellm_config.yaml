# LiteLLM Proxy๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝืช๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ OpenAI ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฮฃ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝัต๏ฟฝ๏ฟฝรผ๏ฟฝยผ๏ฟฝ๏ฟฝ๏ฟฝอต๏ฟฝ Langfuse
# ๏ฟฝฤต๏ฟฝ๏ฟฝ๏ฟฝhttps://docs.litellm.ai/docs/proxy/logging

model_list:
  - model_name: XiYanSQL-QwenCoder-32B-2504
    litellm_params:
      model: openai/XiYanSQL-QwenCoder-32B-2504
      api_base: http://10.13.31.106:19527/v1
      # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝาช๏ฟฝ๏ฟฝสต๏ฟฝ๏ฟฝิฟ๏ฟฝ๏ฟฝ๏ฟฝษฑ๏ฟฝ๏ฟฝ๏ฟฝีผฮป๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝาชสฑ๏ฟฝ๏ฟฝ .env ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ UPSTREAM_OPENAI_API_KEY
      api_key: os.environ/UPSTREAM_OPENAI_API_KEY

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
